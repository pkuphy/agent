name: HN Daily

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00（北京时间 09:00）
  workflow_dispatch:        # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: hn-daily/requirements.txt

      - name: Install dependencies
        run: pip install -r hn-daily/requirements.txt

      - name: Fetch and summarize
        run: python hn-daily/fetch.py
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hn-daily/output
          destination_dir: .
          commit_message: "chore: update HN daily ${{ github.run_id }}"
